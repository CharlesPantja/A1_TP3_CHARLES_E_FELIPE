<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bella Vista — Entrar</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            bv: { bg:'#010906', card:'#020e0a', hover:'#031e15', border:'#042f20', border2:'#064028' }
          }
        }
      }
    }
  </script>
  <style>
    body { background-color: #010906; }
    .glass { background: rgba(2,14,10,0.9); backdrop-filter: blur(16px); }
    .btn-primary { background: linear-gradient(135deg, #059669, #10b981); transition: all 0.2s; }
    .btn-primary:hover { background: linear-gradient(135deg, #047857, #059669); box-shadow: 0 0 20px rgba(16,185,129,0.3); }
    .input-field {
      background: #010906;
      border: 1.5px solid #042f20;
      color: #fff;
      transition: border-color 0.2s;
    }
    .input-field:focus { outline: none; border-color: #10b981; box-shadow: 0 0 0 3px rgba(16,185,129,0.1); }
    .input-field::placeholder { color: #4b5563; }
    .tab-active { border-bottom: 2px solid #10b981; color: #10b981; }
    .tab-inactive { border-bottom: 2px solid transparent; color: #6b7280; }
    @keyframes fadeIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
    .fade-in { animation: fadeIn 0.4s ease forwards; }
    #toast {
      position: fixed; bottom: 1.5rem; right: 1.5rem; z-index: 999;
      padding: 0.85rem 1.5rem; border-radius: 16px; font-weight: 600; font-size: 0.9rem;
      opacity: 0; transform: translateY(8px); transition: all 0.3s;
      pointer-events: none;
    }
    #toast.show { opacity: 1; transform: translateY(0); }
    #toast.success { background: #064028; border: 1px solid #10b981; color: #6ee7b7; }
    #toast.error   { background: #3b0a0a; border: 1px solid #ef4444; color: #fca5a5; }
  </style>
</head>
<body class="min-h-screen text-white flex flex-col">

  <!-- HEADER -->
  <header class="glass sticky top-0 z-50 border-b border-bv-border">
    <div class="max-w-6xl mx-auto px-4 py-3 flex items-center justify-between">
      <a href="/welcome.html" class="flex items-center gap-3">
        <img src="/bellavistalogo.png" alt="Bella Vista" class="h-10 w-10 rounded-full object-cover" onerror="this.style.display='none'">
        <span class="text-xl font-extrabold text-emerald-400">Bella Vista</span>
      </a>
      <a href="/welcome.html" class="text-gray-400 hover:text-white text-sm transition-colors">← Voltar</a>
    </div>
  </header>

  <!-- FORM -->
  <main class="flex-1 flex items-center justify-center px-4 py-12">
    <div class="glass border border-bv-border rounded-3xl p-8 w-full max-w-md fade-in">

      <!-- Logo -->
      <div class="text-center mb-6">
        <img src="/bellavistalogo.png" alt="Bella Vista" class="h-16 w-16 rounded-full object-cover mx-auto mb-3" onerror="this.style.display='none'">
        <h1 class="text-2xl font-extrabold text-white">Bella Vista</h1>
        <p class="text-gray-500 text-sm mt-1">Sabor artesanal, atendimento de excelência</p>
      </div>

      <!-- TABS -->
      <div class="flex border-b border-bv-border mb-6">
        <button onclick="setTab('login')" id="tab-login" class="flex-1 pb-3 font-bold text-sm transition-colors tab-active">Entrar</button>
        <button onclick="setTab('cadastro')" id="tab-cadastro" class="flex-1 pb-3 font-bold text-sm transition-colors tab-inactive">Criar Conta</button>
      </div>

      <!-- LOGIN FORM -->
      <form id="form-login" onsubmit="fazerLogin(event)" class="space-y-4">
        <div>
          <label class="text-xs font-bold text-gray-400 uppercase tracking-wider mb-1 block">E-mail</label>
          <input type="email" id="login-email" required placeholder="seu@email.com"
            class="input-field w-full rounded-xl px-4 py-3 text-sm" />
        </div>
        <div>
          <label class="text-xs font-bold text-gray-400 uppercase tracking-wider mb-1 block">Senha</label>
          <input type="password" id="login-senha" required placeholder="••••••••"
            class="input-field w-full rounded-xl px-4 py-3 text-sm" />
        </div>
        <button type="submit" id="btn-login" class="btn-primary w-full text-white font-extrabold py-3 rounded-full mt-2 text-sm">
          Entrar na minha conta
        </button>
        <p class="text-center text-gray-500 text-xs">
          Não tem conta?
          <button type="button" onclick="setTab('cadastro')" class="text-emerald-400 hover:text-emerald-300 font-bold ml-1">Criar agora</button>
        </p>
      </form>

      <!-- CADASTRO FORM -->
      <form id="form-cadastro" onsubmit="fazerCadastro(event)" class="space-y-4 hidden">
        <div>
          <label class="text-xs font-bold text-gray-400 uppercase tracking-wider mb-1 block">Nome completo</label>
          <input type="text" id="cad-nome" required placeholder="Seu nome completo"
            class="input-field w-full rounded-xl px-4 py-3 text-sm" />
        </div>
        <div>
          <label class="text-xs font-bold text-gray-400 uppercase tracking-wider mb-1 block">E-mail</label>
          <input type="email" id="cad-email" required placeholder="seu@email.com"
            class="input-field w-full rounded-xl px-4 py-3 text-sm" />
        </div>
        <div>
          <label class="text-xs font-bold text-gray-400 uppercase tracking-wider mb-1 block">Senha</label>
          <input type="password" id="cad-senha" required placeholder="Mínimo 6 caracteres"
            class="input-field w-full rounded-xl px-4 py-3 text-sm" />
        </div>
        <button type="submit" id="btn-cadastro" class="btn-primary w-full text-white font-extrabold py-3 rounded-full mt-2 text-sm">
          Criar minha conta
        </button>
        <p class="text-center text-gray-500 text-xs">
          Já tem conta?
          <button type="button" onclick="setTab('login')" class="text-emerald-400 hover:text-emerald-300 font-bold ml-1">Entrar</button>
        </p>
      </form>

    </div>
  </main>

  <div id="toast"></div>

<script>
function setTab(tab) {
  const isLogin = tab === 'login';
  document.getElementById('form-login').classList.toggle('hidden', !isLogin);
  document.getElementById('form-cadastro').classList.toggle('hidden', isLogin);
  document.getElementById('tab-login').className = 'flex-1 pb-3 font-bold text-sm transition-colors ' + (isLogin ? 'tab-active' : 'tab-inactive');
  document.getElementById('tab-cadastro').className = 'flex-1 pb-3 font-bold text-sm transition-colors ' + (!isLogin ? 'tab-active' : 'tab-inactive');
}

function showToast(msg, type) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'show ' + (type || 'success');
  setTimeout(() => { t.className = ''; }, 3500);
}

async function fazerLogin(e) {
  e.preventDefault();
  const btn = document.getElementById('btn-login');
  btn.disabled = true; btn.textContent = 'Entrando...';
  try {
    const r = await fetch('/api/auth/login', {
      method: 'POST', credentials: 'include',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        email: document.getElementById('login-email').value,
        senha: document.getElementById('login-senha').value
      })
    });
    if (r.ok) {
      showToast('✅ Login realizado com sucesso!', 'success');
      setTimeout(() => { location.href = '/welcome.html'; }, 800);
    } else {
      const d = await r.json().catch(() => ({}));
      showToast('❌ ' + (d.message || d.title || 'E-mail ou senha inválidos'), 'error');
      btn.disabled = false; btn.textContent = 'Entrar na minha conta';
    }
  } catch {
    showToast('❌ Erro de conexão. Tente novamente.', 'error');
    btn.disabled = false; btn.textContent = 'Entrar na minha conta';
  }
}

async function fazerCadastro(e) {
  e.preventDefault();
  const btn = document.getElementById('btn-cadastro');
  btn.disabled = true; btn.textContent = 'Criando conta...';
  try {
    const r = await fetch('/api/auth/cadastro', {
      method: 'POST', credentials: 'include',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        nomeCompleto: document.getElementById('cad-nome').value,
        email: document.getElementById('cad-email').value,
        senha: document.getElementById('cad-senha').value
      })
    });
    if (r.ok) {
      showToast('✅ Conta criada! Entrando...', 'success');
      setTimeout(() => { location.href = '/welcome.html'; }, 900);
    } else {
      const d = await r.json().catch(() => ({}));
      const msg = d.errors ? Object.values(d.errors).flat().join(' ') : (d.message || 'Erro ao criar conta');
      showToast('❌ ' + msg, 'error');
      btn.disabled = false; btn.textContent = 'Criar minha conta';
    }
  } catch {
    showToast('❌ Erro de conexão. Tente novamente.', 'error');
    btn.disabled = false; btn.textContent = 'Criar minha conta';
  }
}

// Check URL param for tab
const params = new URLSearchParams(location.search);
if (params.get('tab') === 'cadastro') setTab('cadastro');
</script>
</body>
</html>
