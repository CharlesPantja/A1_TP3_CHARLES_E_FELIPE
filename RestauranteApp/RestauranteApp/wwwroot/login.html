<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Entrar — Bella Vista</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;0,800;1,600;1,700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { display: ['Playfair Display','serif'], sans: ['Inter','sans-serif'] },
          colors: { bv: { bg:'#010906', card:'#020e0a', hover:'#031e15', border:'#042f20', border2:'#064028' } }
        }
      }
    }
  </script>
  <style>
    * { font-family: 'Inter', sans-serif; }
    body { background-color: #010906; }
    .font-display { font-family: 'Playfair Display', serif; }
    .glass { background: rgba(2,14,10,0.92); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); }
    .input-field {
      background: #010906; border: 1px solid #042f20; color: #fff;
      border-radius: .625rem; padding: .75rem 1rem; width: 100%;
      font-size: .9rem; transition: border-color .2s, box-shadow .2s;
      outline: none;
    }
    .input-field:focus { border-color: #10b981; box-shadow: 0 0 0 3px rgba(16,185,129,0.12); }
    .input-field::placeholder { color: #4b5563; }
    .btn-primary {
      background: linear-gradient(135deg, #059669, #10b981);
      transition: all .2s; width: 100%; padding: .875rem; border-radius: .625rem;
      font-weight: 600; font-size: .95rem; color: #fff; border: none; cursor: pointer;
    }
    .btn-primary:hover { background: linear-gradient(135deg, #047857, #059669); box-shadow: 0 0 28px rgba(16,185,129,0.3); }
    .btn-primary:disabled { opacity: .5; cursor: not-allowed; }
    .tab-btn { flex: 1; padding: .625rem; border-radius: .5rem; font-size: .85rem; font-weight: 600; transition: all .2s; cursor: pointer; border: none; }
    .tab-btn.active { background: #10b981; color: #fff; }
    .tab-btn:not(.active) { background: transparent; color: #6b7280; }
    .tab-btn:not(.active):hover { color: #d1d5db; }
    .msg { padding: .75rem 1rem; border-radius: .625rem; font-size: .85rem; text-align: center; display: none; }
    .msg.erro { background: rgba(239,68,68,.12); border: 1px solid rgba(239,68,68,.3); color: #f87171; }
    .msg.ok { background: rgba(16,185,129,.12); border: 1px solid rgba(16,185,129,.3); color: #34d399; }
    @keyframes fadeUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
    .fade-up { animation: fadeUp .5s ease forwards; }
  </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center px-4" style="background: radial-gradient(ellipse at 50% 0%, rgba(16,185,129,0.07) 0%, transparent 60%);">

  <div class="w-full max-w-md fade-up">

    <!-- Logo -->
    <div class="text-center mb-8">
      <a href="/welcome.html" style="text-decoration:none">
        <img src="/bellavistalogo.png" alt="Bella Vista" class="h-14 w-14 rounded-full object-cover mx-auto mb-4" onerror="this.style.display='none'">
        <span class="font-display text-3xl font-bold text-emerald-400">Bella Vista</span>
      </a>
      <p class="text-gray-500 text-sm mt-2">Acesse sua conta para continuar</p>
    </div>

    <!-- Card -->
    <div class="glass border border-bv-border rounded-2xl p-8">

      <!-- Tabs -->
      <div class="flex gap-1 bg-bv-bg rounded-lg p-1 mb-6" style="background:#010906;border:1px solid #042f20">
        <button id="tab-login" class="tab-btn active" onclick="switchTab('login')">Entrar</button>
        <button id="tab-cadastro" class="tab-btn" onclick="switchTab('cadastro')">Criar conta</button>
      </div>

      <!-- Mensagem -->
      <div id="msg" class="msg mb-4"></div>

      <!-- Form Login -->
      <form id="form-login" onsubmit="fazerLogin(event)">
        <div class="space-y-4">
          <div>
            <label class="block text-gray-400 text-xs font-semibold uppercase tracking-wider mb-2">E-mail</label>
            <input id="login-email" type="email" class="input-field" placeholder="seu@email.com" required autocomplete="email">
          </div>
          <div>
            <label class="block text-gray-400 text-xs font-semibold uppercase tracking-wider mb-2">Senha</label>
            <div style="position:relative">
              <input id="login-senha" type="password" class="input-field" placeholder="••••••••" required autocomplete="current-password" style="padding-right:3rem">
              <button type="button" onclick="toggleSenha('login-senha','olho-login')" style="position:absolute;right:.875rem;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:#4b5563" id="olho-login">
                <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              </button>
            </div>
          </div>
          <button type="submit" id="btn-login" class="btn-primary mt-2">Entrar</button>
        </div>
      </form>

      <!-- Form Cadastro -->
      <form id="form-cadastro" onsubmit="fazerCadastro(event)" style="display:none">
        <div class="space-y-4">
          <div>
            <label class="block text-gray-400 text-xs font-semibold uppercase tracking-wider mb-2">Nome completo</label>
            <input id="cad-nome" type="text" class="input-field" placeholder="Seu nome" required autocomplete="name">
          </div>
          <div>
            <label class="block text-gray-400 text-xs font-semibold uppercase tracking-wider mb-2">E-mail</label>
            <input id="cad-email" type="email" class="input-field" placeholder="seu@email.com" required autocomplete="email">
          </div>
          <div>
            <label class="block text-gray-400 text-xs font-semibold uppercase tracking-wider mb-2">Senha</label>
            <div style="position:relative">
              <input id="cad-senha" type="password" class="input-field" placeholder="Mínimo 6 caracteres" required minlength="6" autocomplete="new-password" style="padding-right:3rem">
              <button type="button" onclick="toggleSenha('cad-senha','olho-cad')" style="position:absolute;right:.875rem;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:#4b5563" id="olho-cad">
                <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              </button>
            </div>
          </div>
          <div>
            <label class="block text-gray-400 text-xs font-semibold uppercase tracking-wider mb-2">Confirmar senha</label>
            <input id="cad-confirmar" type="password" class="input-field" placeholder="Repita a senha" required minlength="6" autocomplete="new-password">
          </div>
          <button type="submit" id="btn-cadastro" class="btn-primary mt-2">Criar conta</button>
        </div>
      </form>

    </div>

    <p class="text-center text-gray-600 text-xs mt-6">
      <a href="/welcome.html" class="text-emerald-600 hover:text-emerald-400 transition-colors" style="text-decoration:none">Voltar para o inicio</a>
    </p>
  </div>

<script>
function switchTab(tab) {
  const isLogin = tab === 'login';
  document.getElementById('form-login').style.display = isLogin ? '' : 'none';
  document.getElementById('form-cadastro').style.display = isLogin ? 'none' : '';
  document.getElementById('tab-login').className = 'tab-btn' + (isLogin ? ' active' : '');
  document.getElementById('tab-cadastro').className = 'tab-btn' + (!isLogin ? ' active' : '');
  showMsg('', '');
}

function showMsg(texto, tipo) {
  const el = document.getElementById('msg');
  if (!texto) { el.style.display = 'none'; return; }
  el.textContent = texto;
  el.className = 'msg ' + tipo;
  el.style.display = 'block';
}

function toggleSenha(inputId, btnId) {
  const input = document.getElementById(inputId);
  const isText = input.type === 'text';
  input.type = isText ? 'password' : 'text';
}

async function fazerLogin(e) {
  e.preventDefault();
  const btn = document.getElementById('btn-login');
  btn.disabled = true; btn.textContent = 'Entrando...';
  showMsg('', '');
  try {
    const r = await fetch('/api/auth/login', {
      method: 'POST', credentials: 'include',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        email: document.getElementById('login-email').value,
        senha: document.getElementById('login-senha').value
      })
    });
    const d = await r.json();
    if (r.ok) {
      showMsg('Login realizado com sucesso!', 'ok');
      setTimeout(() => { window.location.href = '/welcome.html'; }, 800);
    } else {
      showMsg(d.message || 'E-mail ou senha incorretos.', 'erro');
    }
  } catch(_) {
    showMsg('Erro de conexao. Tente novamente.', 'erro');
  } finally {
    btn.disabled = false; btn.textContent = 'Entrar';
  }
}

async function fazerCadastro(e) {
  e.preventDefault();
  const senha = document.getElementById('cad-senha').value;
  const confirmar = document.getElementById('cad-confirmar').value;
  if (senha !== confirmar) { showMsg('As senhas nao conferem.', 'erro'); return; }
  const btn = document.getElementById('btn-cadastro');
  btn.disabled = true; btn.textContent = 'Criando conta...';
  showMsg('', '');
  try {
    const r = await fetch('/api/auth/cadastro', {
      method: 'POST', credentials: 'include',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        nomeCompleto: document.getElementById('cad-nome').value,
        email: document.getElementById('cad-email').value,
        senha
      })
    });
    const d = await r.json();
    if (r.ok) {
      showMsg('Conta criada! Redirecionando...', 'ok');
      setTimeout(() => { window.location.href = '/welcome.html'; }, 1000);
    } else {
      const erros = d.errors ? Object.values(d.errors).flat().join(' ') : (d.message || 'Erro ao criar conta.');
      showMsg(erros, 'erro');
    }
  } catch(_) {
    showMsg('Erro de conexao. Tente novamente.', 'erro');
  } finally {
    btn.disabled = false; btn.textContent = 'Criar conta';
  }
}

// Redirecionar se já logado
(async () => {
  try {
    const r = await fetch('/api/auth/me', { credentials: 'include' });
    if (r.ok) window.location.href = '/welcome.html';
  } catch(_) {}
})();

// Verificar query param
const params = new URLSearchParams(location.search);
if (params.get('tab') === 'cadastro') switchTab('cadastro');
if (params.get('redirected') === '1') showMsg('Faca login para continuar.', 'erro');
</script>
</body>
</html>
