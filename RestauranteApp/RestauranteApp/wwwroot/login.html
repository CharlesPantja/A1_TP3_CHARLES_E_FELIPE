<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Entrar — Bella Vista</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family:'Segoe UI',sans-serif;
      min-height:100vh;
      background:linear-gradient(135deg, #1b4332 0%, #2d6a4f 100%);
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      padding:1.5rem;
    }
    .auth-card {
      background:#fff;
      border-radius:16px;
      padding:2.5rem;
      width:100%;
      max-width:420px;
      box-shadow:0 8px 32px rgba(0,0,0,0.25);
    }
    .auth-logo { text-align:center; font-size:2.5rem; margin-bottom:0.25rem; }
    .auth-titulo { text-align:center; font-size:1.4rem; font-weight:700; color:#1b4332; margin-bottom:0.25rem; }
    .auth-sub { text-align:center; color:#888; font-size:0.85rem; margin-bottom:1.75rem; }

    .auth-tabs { display:flex; border-radius:8px; overflow:hidden; border:1.5px solid #dee2e6; margin-bottom:1.5rem; }
    .auth-tab { flex:1; padding:0.65rem; background:#f8f9fa; border:none; cursor:pointer; font-size:0.9rem; font-weight:600; color:#666; transition:all 0.2s; font-family:inherit; }
    .auth-tab.ativo { background:#1b4332; color:#fff; }

    .form-panel { display:none; }
    .form-panel.ativo { display:block; }

    .form-group { margin-bottom:1rem; }
    .form-group label { display:block; font-size:0.82rem; color:#555; margin-bottom:0.35rem; font-weight:600; }
    .form-group input {
      width:100%;
      padding:0.65rem 0.9rem;
      border:1.5px solid #dee2e6;
      border-radius:8px;
      font-size:0.92rem;
      font-family:inherit;
      transition:border 0.2s;
    }
    .form-group input:focus { outline:none; border-color:#52b788; }

    .btn-verde {
      width:100%;
      padding:0.75rem;
      background:#2d6a4f;
      color:#fff;
      border:none;
      border-radius:8px;
      font-size:1rem;
      font-weight:600;
      cursor:pointer;
      transition:background 0.2s;
      font-family:inherit;
      margin-top:0.5rem;
    }
    .btn-verde:hover { background:#1b4332; }

    .form-erro { color:#e63946; font-size:0.82rem; margin-top:0.25rem; min-height:1rem; }

    .link-voltar { text-align:center; margin-top:1.25rem; font-size:0.85rem; color:#888; }
    .link-voltar a { color:#2d6a4f; text-decoration:none; font-weight:600; }
    .link-voltar a:hover { text-decoration:underline; }

    .msg-info {
      background:#d1fae5;
      border:1px solid #6ee7b7;
      color:#065f46;
      border-radius:8px;
      padding:0.75rem 1rem;
      font-size:0.85rem;
      margin-bottom:1rem;
      display:none;
    }

    .toast {
      position:fixed; bottom:2rem; right:2rem;
      padding:0.85rem 1.5rem; border-radius:10px; color:#fff;
      font-size:0.9rem; font-weight:600; z-index:500;
      opacity:0; transform:translateY(10px);
      transition:opacity 0.3s, transform 0.3s; pointer-events:none;
    }
    .toast.visivel { opacity:1; transform:translateY(0); }
    .toast-sucesso { background:#2d6a4f; }
    .toast-erro { background:#e63946; }
  </style>
</head>
<body>

<div class="auth-card">
  <div class="auth-logo">🍽</div>
  <h1 class="auth-titulo">Bella Vista</h1>
  <p class="auth-sub">Acesse sua conta ou cadastre-se</p>

  <div id="msg-info" class="msg-info"></div>

  <div class="auth-tabs">
    <button class="auth-tab ativo" onclick="trocarTab('login', this)">Entrar</button>
    <button class="auth-tab" onclick="trocarTab('cadastro', this)">Cadastrar</button>
  </div>

  <!-- LOGIN -->
  <div id="panel-login" class="form-panel ativo">
    <div class="form-group">
      <label>E-mail</label>
      <input type="email" id="login-email" placeholder="seu@email.com" />
    </div>
    <div class="form-group">
      <label>Senha</label>
      <input type="password" id="login-senha" placeholder="••••••" />
    </div>
    <div id="login-erro" class="form-erro"></div>
    <button class="btn-verde" onclick="fazerLogin()">Entrar</button>
  </div>

  <!-- CADASTRO -->
  <div id="panel-cadastro" class="form-panel">
    <div class="form-group">
      <label>Nome Completo</label>
      <input type="text" id="cad-nome" placeholder="Seu nome completo" />
    </div>
    <div class="form-group">
      <label>E-mail</label>
      <input type="email" id="cad-email" placeholder="seu@email.com" />
    </div>
    <div class="form-group">
      <label>Senha</label>
      <input type="password" id="cad-senha" placeholder="Mínimo 6 caracteres com 1 número" />
    </div>
    <div id="cad-erro" class="form-erro"></div>
    <button class="btn-verde" onclick="fazerCadastro()">Criar Conta</button>
  </div>

  <div class="link-voltar">
    <a href="/">← Voltar ao cardápio sem login</a>
  </div>
</div>

<div id="toast" class="toast"></div>

<script>
function trocarTab(tab, btn) {
  document.querySelectorAll('.auth-tab').forEach(b => b.classList.remove('ativo'));
  document.querySelectorAll('.form-panel').forEach(p => p.classList.remove('ativo'));
  btn.classList.add('ativo');
  document.getElementById('panel-' + tab).classList.add('ativo');
}

function mostrarToast(msg, tipo) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast ' + (tipo === 'erro' ? 'toast-erro' : 'toast-sucesso');
  void t.offsetWidth;
  t.classList.add('visivel');
  clearTimeout(t._t);
  t._t = setTimeout(() => t.classList.remove('visivel'), 3000);
}

async function fazerLogin() {
  const email = document.getElementById('login-email').value.trim();
  const senha = document.getElementById('login-senha').value;
  const erroEl = document.getElementById('login-erro');
  erroEl.textContent = '';
  if (!email || !senha) { erroEl.textContent = 'Preencha todos os campos.'; return; }

  const r = await fetch('/api/auth/login', {
    method:'POST', credentials:'include',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ email, senha, lembrarMe: false })
  });
  const data = await r.json().catch(() => null);
  if (!r.ok) { erroEl.textContent = 'E-mail ou senha inválidos.'; return; }

  mostrarToast('Bem-vindo(a), ' + data.nome + '!');
  setTimeout(() => {
    const retorno = sessionStorage.getItem('retorno_login') || '/';
    sessionStorage.removeItem('retorno_login');
    window.location.href = retorno;
  }, 800);
}

async function fazerCadastro() {
  const nomeCompleto = document.getElementById('cad-nome').value.trim();
  const email = document.getElementById('cad-email').value.trim();
  const senha = document.getElementById('cad-senha').value;
  const erroEl = document.getElementById('cad-erro');
  erroEl.textContent = '';

  if (!nomeCompleto || !email || !senha) { erroEl.textContent = 'Preencha todos os campos.'; return; }
  if (senha.length < 6) { erroEl.textContent = 'Senha deve ter ao menos 6 caracteres.'; return; }

  const r = await fetch('/api/auth/cadastro', {
    method:'POST', credentials:'include',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ nomeCompleto, email, senha })
  });
  const data = await r.json().catch(() => null);
  if (!r.ok) {
    const erros = Array.isArray(data) ? data.join(', ') : (data?.toString() || 'Erro no cadastro.');
    erroEl.textContent = erros;
    return;
  }
  mostrarToast('Conta criada com sucesso!');
  setTimeout(() => window.location.href = '/', 800);
}

// Mostrar mensagem de aviso (ex: "faça login para delivery")
const msgSessao = sessionStorage.getItem('msg_login');
if (msgSessao) {
  const el = document.getElementById('msg-info');
  el.textContent = msgSessao;
  el.style.display = 'block';
  sessionStorage.removeItem('msg_login');
}

// Enter para enviar
document.addEventListener('keydown', e => {
  if (e.key !== 'Enter') return;
  if (document.getElementById('panel-login').classList.contains('ativo')) fazerLogin();
  else fazerCadastro();
});
</script>
</body>
</html>
